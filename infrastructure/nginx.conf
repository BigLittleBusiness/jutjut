# ─────────────────────────────────────────────────────────────────────────────
# JutJut — Nginx reverse-proxy configuration
#
# Intended for use on an AWS EC2 instance or as a sidecar container in ECS.
# Nginx sits in front of the Node.js app (running on 127.0.0.1:3000) and
# handles TLS termination, gzip compression, and static-asset caching.
#
# Prerequisites:
#   - Certbot / ACM certificate mounted at the paths below
#   - Replace every occurrence of "jutjut.com.au" with your actual domain
# ─────────────────────────────────────────────────────────────────────────────

# Tune worker count to match available CPU cores
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # Gzip compression for text assets
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Security headers (applied to all responses) ───────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Upstream: Node.js app ─────────────────────────────────────────────────
    upstream jutjut_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name jutjut.com.au www.jutjut.com.au;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name jutjut.com.au www.jutjut.com.au;

        # TLS — replace with your certificate paths (Certbot or ACM)
        ssl_certificate     /etc/letsencrypt/live/jutjut.com.au/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jutjut.com.au/privkey.pem;

        # Modern TLS settings
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS (enable after confirming HTTPS works correctly)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Static assets — long-lived cache ──────────────────────────────────
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
            proxy_pass         http://jutjut_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires            1y;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }

        # ── API + tRPC — no caching ────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://jutjut_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Generous timeouts for long-running LLM / file-upload requests
            proxy_read_timeout  120s;
            proxy_send_timeout  120s;

            # Increase body size limit for file uploads (matches Express 50 MB limit)
            client_max_body_size 55m;
        }

        # ── All other routes — SPA fallback ───────────────────────────────────
        location / {
            proxy_pass         http://jutjut_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
