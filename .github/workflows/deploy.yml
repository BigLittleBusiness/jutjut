# ─────────────────────────────────────────────────────────────────────────────
# Deploy — builds and pushes a Docker image to AWS ECR, then updates an ECS
# service to roll out the new revision.
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID       — IAM key with ECR push + ECS deploy permissions
#   AWS_SECRET_ACCESS_KEY   — Corresponding secret
#   AWS_REGION              — e.g. ap-southeast-2
#   ECR_REPOSITORY          — ECR repository name, e.g. jutjut
#   ECS_CLUSTER             — ECS cluster name, e.g. jutjut-cluster
#   ECS_SERVICE             — ECS service name, e.g. jutjut-service
#   ECS_TASK_DEFINITION     — Path to the task definition JSON file in the repo,
#                             e.g. infrastructure/task-definition.json
#   CONTAINER_NAME          — Container name inside the task definition, e.g. jutjut
#
# This workflow only runs after the CI workflow passes.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    # Only deploy if CI passes
    needs: []   # Remove this line and uncomment below once CI workflow is confirmed working
    # needs: [test]  # reference the job name from ci.yml if using a combined workflow

    permissions:
      id-token: write   # Required for OIDC authentication (recommended over long-lived keys)
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_SERVICE }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy updated task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
