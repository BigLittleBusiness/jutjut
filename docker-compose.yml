# ─────────────────────────────────────────────────────────────────────────────
# JutJut — Docker Compose (local development)
#
# Starts:
#   - mysql  : local MySQL 8 database (mirrors the production TiDB dialect)
#   - app    : the JutJut Node.js server in development mode (hot-reload via tsx)
#
# Usage:
#   docker compose up          # start everything
#   docker compose up -d       # start in background
#   docker compose down -v     # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jutjut
      MYSQL_USER: jutjut
      MYSQL_PASSWORD: jutjutpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "jutjut", "-pjutjutpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: deps        # Use the deps stage so dev tools are available
    working_dir: /app
    command: pnpm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://jutjut:jutjutpassword@mysql:3306/jutjut
    volumes:
      # Mount source for hot-reload — node_modules comes from the image
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
